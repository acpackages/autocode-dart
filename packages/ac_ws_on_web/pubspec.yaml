name: ac_ws_on_web
description: A bridge between AcWeb and WebSockets, allowing connected clients to handle requests over WS.
version: 1.0.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  autocode:
    path: './../autocode'
  ac_extensions:
    path: './../ac_extensions'
  ac_mirrors:
    path: './../ac_mirrors'
  ac_web:
    path: './../ac_web'
  ac_ws_server:
    path: './../ac_ws_server'
  ac_ws_client:
    path: './../ac_ws_client'

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
