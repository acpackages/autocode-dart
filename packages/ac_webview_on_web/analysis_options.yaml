include: package:lints/recommended.yaml

linter:
  rules:
    - camel_case_types
    - library_names
    - library_prefixes
    - non_constant_identifier_names
    - constant_identifier_names
    - prefer_final_fields
    - prefer_is_not_empty
    - prefer_is_empty
    - prefer_spread_collections
    - recursive_getters
    - slash_for_doc_comments
    - type_init_formals
