name: ac_webview_on_web
description: A bridge between AcWeb and WebView JavaScript channels, allowing web applications inside a WebView to handle requests via JavaScript channels.
version: 1.0.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  autocode:
    path: './../autocode'
  ac_extensions:
    path: './../ac_extensions'
  ac_mirrors:
    path: './../ac_mirrors'
  ac_web:
    path: './../ac_web'
  ac_webview:
    path: './../ac_webview'

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
