name: ac_cef
description: >-
  A pure Dart FFI port of the Chromium Embedded Framework (CEF),
  mirroring the JCEF API. Provides CefApp, CefClient, CefBrowser and all
  major handler interfaces backed by a native C bridge.
version: 0.1.0
publish_to: none
homepage: https://github.com/your-org/ac_cef

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  ffi: ^2.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
