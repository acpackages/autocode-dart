name: ac_sync_on_ws
description: A synchronization package for AcSync that uses WebSockets for data transport.
version: 0.0.1
publish_to: none
repository: https://github.com/acpackages/autocode-dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  ac_data_dictionary:
    path: ../ac_data_dictionary
  ac_extensions:
    path: ../ac_extensions
  ac_sync:
    path: ../ac_sync
  ac_web_socket:
    path: ../ac_web_socket

  autocode:
    path: ../autocode

dev_dependencies:
  lints: ^2.0.0
  test: ^1.24.0
